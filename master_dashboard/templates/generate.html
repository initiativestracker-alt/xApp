<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Generate XAPP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header a { color: #a78bfa; text-decoration: none; font-size: 0.9rem; }
    main { max-width: 640px; margin: 48px auto; background: white; border-radius: 14px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .sub { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
    input[type=text], textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 20px; }
    textarea { height: 100px; resize: vertical; }
    input[type=file] { margin-bottom: 20px; }
    .btn { width: 100%; padding: 12px; background: #6d28d9; color: white; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
    .btn:hover { background: #5b21b6; }
    .result { margin-top: 24px; padding: 14px; border-radius: 8px; font-size: 0.85rem; display: none; }
    .result.ok    { background: #dcfce7; color: #166534; }
    .result.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
<header>
  <h1>⚡ XAPP Platform</h1>
  <a href="/">← Dashboard</a>
</header>
<main>
  <h2>Generate New XAPP</h2>
  <p class="sub">Define a workflow and the platform will scaffold a fully independent app for it.</p>

  <label>Workflow Name</label>
  <input type="text" id="name" placeholder="e.g. Invoice Processing"/>

  <label>Project Scope</label>
  <textarea id="scope" placeholder="Describe what this workflow does…"></textarea>

  <label>Your User ID</label>
  <input type="text" id="user" placeholder="e.g. naveena" value="naveena"/>

  <label>Workflow JSON File (nodes + edges)</label>
  <input type="file" id="workflow_file" accept=".json"/>

  <button class="btn" onclick="generate()">Generate XAPP →</button>

  <div class="result" id="result"></div>
</main>
<script>
async function generate() {
  const name  = document.getElementById('name').value.trim();
  const scope = document.getElementById('scope').value.trim();
  const user  = document.getElementById('user').value.trim();
  const file  = document.getElementById('workflow_file').files[0];
  const res   = document.getElementById('result');

  if (!name || !scope || !file) {
    res.className = 'result error'; res.style.display = 'block';
    res.textContent = 'Please fill in all fields and upload a workflow JSON file.';
    return;
  }

  const fd = new FormData();
  fd.append('name', name);
  fd.append('scope', scope);
  fd.append('user', user);
  fd.append('workflow_json', file);

  const r = await fetch('/generate', { method: 'POST', body: fd });
  const d = await r.json();

  if (d.ok) {
    res.className = 'result ok'; res.style.display = 'block';
    res.innerHTML = `✓ Workflow <strong>${d.workflow.name}</strong> created on port <strong>${d.workflow.port}</strong>. <a href="/">← Back to dashboard</a>`;
  } else {
    res.className = 'result error'; res.style.display = 'block';
    res.textContent = `Error: ${d.message}`;
  }
}
</script>
</body>
</html>
